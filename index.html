<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瞬态吸收数据预处理工具</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #f5f7fa; color: #333; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 30px; }
.header h1 { font-size: 24px; margin-bottom: 4px; }
.header p { font-size: 14px; opacity: 0.85; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
.card h2 { font-size: 18px; margin-bottom: 16px; color: #444; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
.params { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
.param-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
.param-group input, .param-group select { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
.param-group input:focus, .param-group select:focus { outline: none; border-color: #667eea; }
.upload-zone { border: 2px dashed #ccc; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
.upload-zone:hover, .upload-zone.dragover { border-color: #667eea; background: #f0f0ff; }
.upload-zone p { color: #888; margin-top: 8px; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: #667eea; color: white; }
.btn-primary:hover { background: #5a6fd6; }
.btn-primary:disabled { background: #ccc; cursor: not-allowed; }
.btn-download { background: #28a745; color: white; margin-top: 12px; }
.btn-download:hover { background: #218838; }
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #eee; }
.tab { padding: 10px 20px; cursor: pointer; font-size: 14px; color: #888; border-bottom: 3px solid transparent; transition: all 0.2s; }
.tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: 600; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.plot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.plot-box { background: #fafafa; border-radius: 8px; padding: 12px; min-height: 350px; }
.plot-box h3 { font-size: 14px; color: #666; margin-bottom: 8px; text-align: center; }
.status { padding: 8px 16px; border-radius: 6px; font-size: 13px; margin-top: 12px; }
.status-info { background: #e8f4fd; color: #0c5460; }
.status-success { background: #d4edda; color: #155724; }
.status-error { background: #f8d7da; color: #721c24; }
.progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-top: 12px; }
.progress-bar .fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 0.3s; }
.file-list { margin-top: 12px; }
.file-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #f8f9fa; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
.file-item .name { font-weight: 500; }
.file-item .size { color: #888; }
@media (max-width: 768px) { .plot-grid { grid-template-columns: 1fr; } .params { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 瞬态吸收数据预处理工具</h1>
  <p>波长裁剪 · 基线扣除 · 啁啾校正 — 纯前端，无需服务器</p>
</div>

<div class="container">
  <div class="card">
    <h2>⚙️ 参数设置</h2>
    <div class="params">
      <div class="param-group">
        <label>波长下限 (nm)</label>
        <input type="number" id="wlMin" value="450">
      </div>
      <div class="param-group">
        <label>波长上限 (nm)</label>
        <input type="number" id="wlMax" value="650">
      </div>
      <div class="param-group">
        <label>基线扣除点数 (t&lt;0)</label>
        <input type="number" id="nBaseline" value="10" min="1" max="50">
      </div>
      <div class="param-group">
        <label>啁啾校正方法</label>
        <select id="chirpMethod">
          <option value="half_height">半高点法</option>
          <option value="global" selected>全局优化法</option>
        </select>
      </div>
      <div class="param-group">
        <label>显示时间下限 (ps)</label>
        <input type="number" id="tViewMin" value="-1.0" step="0.5">
      </div>
      <div class="param-group">
        <label>显示时间上限 (ps)</label>
        <input type="number" id="tViewMax" value="2.0" step="0.5">
      </div>
      <div class="param-group">
        <label>探测波长 (逗号分隔, nm)</label>
        <input type="text" id="probeWl" value="480, 520, 560, 600, 640">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>📁 上传数据</h2>
    <div class="upload-zone" id="uploadZone">
      <div style="font-size: 40px;">📂</div>
      <p>点击或拖拽CSV文件到此处（支持多文件）</p>
      <p style="font-size: 12px; color: #aaa;">第1行为时间(ps)，后续行为波长(nm)+ΔA，末尾文本自动忽略</p>
      <input type="file" id="fileInput" accept=".csv" multiple style="display:none">
    </div>
    <div class="file-list" id="fileList"></div>
    <div style="margin-top: 16px; text-align: center;">
      <button class="btn btn-primary" id="processBtn" disabled onclick="processAll()">🚀 开始处理</button>
    </div>
    <div id="statusArea"></div>
  </div>

  <div id="resultsArea"></div>
</div>

<script src="app.js"></script>
</body>
</html>
